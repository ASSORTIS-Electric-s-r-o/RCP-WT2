<?xml version="1.0" encoding="utf-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="28"
    height="28"
    viewBox="0 0 28 28">
    <defs>
        <linearGradient id="bagGradient" x1="6" y1="5" x2="20" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#FDE68A"/>
            <stop offset="1" stop-color="#D97706"/>
        </linearGradient>

        <linearGradient id="waterGradient" x1="18" y1="11" x2="23" y2="23" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#67E8F9"/>
            <stop offset="1" stop-color="#0284C7"/>
        </linearGradient>

        <linearGradient id="seedGradient" x1="5" y1="15" x2="14" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#A3E635"/>
            <stop offset="1" stop-color="#65A30D"/>
        </linearGradient>
    </defs>

    <!-- Průhledné pozadí -->

    <!-- Sáček mouky / suroviny -->
    <path
        d="M8.2 6.4
           C8.2 5.6 8.85 5 9.65 5
           H16.35
           C17.15 5 17.8 5.6 17.8 6.4
           L19.2 21.4
           C19.3 22.35 18.55 23.2 17.6 23.2
           H8.4
           C7.45 23.2 6.7 22.35 6.8 21.4Z"
        fill="url(#bagGradient)"/>

    <!-- Horní přehyb sáčku -->
    <path
        d="M9.2 7.4
           H16.8
           L16.45 10.2
           C14.35 9.35 11.65 9.35 9.55 10.2Z"
        fill="#FFF7ED"
        opacity="0.65"/>

    <!-- Symbol mouky -->
    <text
        x="13"
        y="17.1"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="5.2"
        font-weight="700"
        fill="#7C2D12">kg</text>

    <!-- Kapka vody -->
    <path
        d="M21.1 11.2
           C22.85 13.75 24.0 15.7 24.0 18.05
           C24.0 20.35 22.35 22.0 20.3 22.0
           C18.25 22.0 16.6 20.35 16.6 18.05
           C16.6 15.7 18.05 13.75 20.0 11.2
           C20.28 10.85 20.82 10.85 21.1 11.2Z"
        fill="url(#waterGradient)"/>

    <path
        d="M19.3 14.5
           C18.85 15.25 18.45 16.1 18.45 17.15"
        fill="none"
        stroke="#E0F2FE"
        stroke-width="0.9"
        stroke-linecap="round"
        opacity="0.9"/>

    <!-- Semínka -->
    <ellipse
        cx="7.7"
        cy="21.0"
        rx="2.1"
        ry="1.15"
        transform="rotate(-28 7.7 21.0)"
        fill="url(#seedGradient)"/>

    <ellipse
        cx="11.1"
        cy="21.35"
        rx="2.0"
        ry="1.1"
        transform="rotate(24 11.1 21.35)"
        fill="#84CC16"/>

    <ellipse
        cx="9.4"
        cy="18.7"
        rx="1.8"
        ry="1.0"
        transform="rotate(-6 9.4 18.7)"
        fill="#A3E635"/>

    <!-- Jemné bílé linky na semínkách -->
    <path
        d="M7.0 21.1 L8.4 20.55
           M10.4 21.1 L11.8 21.65
           M8.65 18.65 L10.05 18.75"
        stroke="#ECFCCB"
        stroke-width="0.45"
        stroke-linecap="round"
        opacity="0.85"/>
</svg>
